<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<template id="__bundler_thumbnail"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#0a0a0a"></rect><rect x="30" y="34" width="14" height="32" fill="#e8541e"></rect><rect x="52" y="34" width="14" height="32" fill="#f2f2ee"></rect></svg></template>
<title>SanityAI — Carousel Posts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
<style>
  doc-page:not(:defined) { visibility: hidden; }
  body { margin: 0; background: #55554f; font-family: "Instrument Sans", -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif; -webkit-font-smoothing: antialiased; color: #141414; }
  a { color: inherit; text-decoration: none; }
  a:hover { color: #777; }
  .slide { width: 1080px; height: 1350px; box-sizing: border-box; break-after: page; position: relative; overflow: hidden; display: flex; flex-direction: column; padding: 96px 88px; }
</style>
</helmet>
<x-import component-from-global-scope="doc-page" from="./doc-page.js" width="1080px" height="1350px" margin="0" hint-size="1080px,1350px" style="font-family: {{ docFont }};">

  <sc-for list="{{ carousels }}" as="c" hint-placeholder-count="3">

    <!-- COVER -->
    <div class="slide" style="background: #0a0a0a; color: #f2f2ee; justify-content: space-between;">
      <div style="position: absolute; inset: 0; display: flex; justify-content: flex-end; gap: 12px; padding-right: 60px;">
        <sc-for list="{{ c.bars }}" as="b" hint-placeholder-count="12">
          <div style="width: 6px; height: {{ b.h }}%; background: #e8541e; opacity: {{ b.o }}; align-self: flex-end;"></div>
        </sc-for>
      </div>
      <div style="position: relative; display: flex; justify-content: space-between; align-items: flex-start;">
        <img src="uploads/logoblack.png" alt="SanityAI" style="height: 22px; filter: invert(1);">
        <span style="font-size: 22px; color: #8f8f89; font-family: monospace;">{{ c.count }}</span>
      </div>
      <div style="position: relative;">
        <div style="display: flex; align-items: center; gap: 14px; font-size: 24px; letter-spacing: .06em; text-transform: uppercase; color: #8f8f89; margin-bottom: 34px;"><span style="width: 14px; height: 14px; background: #e8541e; display: inline-block;"></span>{{ c.tag }}</div>
        <div style="font-size: 86px; font-weight: 600; letter-spacing: -.03em; line-height: 1.06; max-width: 840px;">{{ c.title }}</div>
      </div>
      <div style="position: relative; display: flex; justify-content: space-between; align-items: flex-end;">
        <span style="font-size: 30px; font-weight: 500; color: #f2f2ee;">Swipe →</span>
        <span style="font-size: 22px; color: #8f8f89; font-family: monospace;">sanity.ai</span>
      </div>
    </div>

    <!-- CONTENT -->
    <sc-for list="{{ c.slides }}" as="s" hint-placeholder-count="3">
      <div class="slide" style="background: {{ s.bg }}; justify-content: space-between;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <div style="display: flex; align-items: center; gap: 14px; font-size: 24px; letter-spacing: .06em; text-transform: uppercase; color: #9a9a94;"><span style="width: 13px; height: 13px; background: #e8541e; display: inline-block;"></span>{{ c.tag }}</div>
          <span style="font-size: 24px; color: #b6b6b0; font-family: monospace;">{{ s.num }}</span>
        </div>
        <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 34px; padding: 40px 0;">
          <div style="font-size: 74px; font-weight: 600; letter-spacing: -.03em; line-height: 1.08;">{{ s.title }}</div>
          <div style="font-size: 33px; line-height: 1.5; color: #55554f; max-width: 820px;">{{ s.d }}</div>
          <div style="display: flex; align-items: stretch; gap: 24px; margin-top: 8px;">
            <div style="background: #0a0a0a; color: #f2f2ee; border-radius: 20px; padding: 34px 40px; display: flex; flex-direction: column; justify-content: center; min-width: 260px;">
              <div style="font-size: 64px; font-weight: 600; letter-spacing: -.03em; line-height: 1; color: #e8541e;">{{ s.stat }}</div>
              <div style="font-size: 21px; color: #a5a59f; margin-top: 12px; line-height: 1.4;">{{ s.statLabel }}</div>
            </div>
            <div style="flex: 1; background: #ffffff; border: 1px solid #e4e4df; border-radius: 20px; padding: 30px 36px; display: flex; flex-direction: column; justify-content: center; gap: 16px;">
              <sc-for list="{{ s.bullets }}" as="b" hint-placeholder-count="3">
                <div style="font-size: 25px; display: flex; gap: 16px; align-items: baseline; color: #2a2a28;"><span style="color: #e8541e;">—</span><span>{{ b }}</span></div>
              </sc-for>
            </div>
          </div>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <img src="uploads/logoblack.png" alt="SanityAI" style="height: 20px;">
          <span style="font-size: 21px; color: #9a9a94; font-family: monospace;">sanity.ai</span>
        </div>
      </div>
    </sc-for>

    <!-- CTA -->
    <div class="slide" style="background: #0a0a0a; color: #f2f2ee; justify-content: space-between;">
      <div style="position: absolute; inset: 0; display: flex; gap: 12px; padding-left: 60px;">
        <sc-for list="{{ c.bars }}" as="b" hint-placeholder-count="12">
          <div style="width: 6px; height: {{ b.h }}%; background: #1c1c1a; align-self: flex-end;"></div>
        </sc-for>
      </div>
      <div style="position: relative; display: flex; justify-content: space-between; align-items: flex-start;">
        <img src="uploads/logoblack.png" alt="SanityAI" style="height: 22px; filter: invert(1);">
        <span style="font-size: 22px; color: #8f8f89; font-family: monospace;">{{ c.tag }}</span>
      </div>
      <div style="position: relative;">
        <div style="display: flex; align-items: center; gap: 14px; font-size: 24px; letter-spacing: .06em; text-transform: uppercase; color: #8f8f89; margin-bottom: 34px;"><span style="width: 14px; height: 14px; background: #e8541e; display: inline-block;"></span>Next step</div>
        <div style="font-size: 66px; font-weight: 600; letter-spacing: -.03em; line-height: 1.1; max-width: 860px;">{{ c.ctaLine }}</div>
      </div>
      <div style="position: relative; display: flex; flex-direction: column; gap: 26px;">
        <div style="display: flex; align-items: center; gap: 22px;">
          <span style="background: #f2f2ee; color: #0a0a0a; font-size: 26px; font-weight: 500; padding: 20px 42px; border-radius: 999px;">Book a call →</span>
          <span style="font-size: 22px; color: #a5a59f; font-family: monospace;">cal.com/wasim/sanity</span>
        </div>
        <div style="font-size: 22px; color: #55554f; font-family: monospace;">wasim@sanity.ai · sanity.ai</div>
      </div>
    </div>

  </sc-for>

</x-import>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;fontFamily&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;Instrument Sans&quot;, &quot;System&quot;], &quot;default&quot;: &quot;Instrument Sans&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Typography&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const docFont = (this.props.fontFamily ?? 'Instrument Sans') === 'Instrument Sans'
      ? '"Instrument Sans", -apple-system, BlinkMacSystemFont, sans-serif'
      : '-apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif';
    const mkBars = (seed) => {
      const arr = [];
      for (let i = 0; i < 12; i++) arr.push({ h: 30 + ((i * seed) % 62), o: 0.25 + ((i * 29) % 60) / 100 });
      return arr;
    };
    const raw = [
      {
        tag: 'Ops automation', count: '01 / 03',
        title: '3 automations that pay for themselves in a month.',
        ctaLine: "Bring us your workflows. We'll show you which ones to automate first.",
        slides: [
          { title: 'Instant lead routing', d: 'Every inbound lead is enriched, scored, and handed to the right owner before it cools — no shared inbox, no manual triage.', stat: '38s', statLabel: 'median lead → owner', bullets: ['Enrich 38 firmographic fields', 'Score on fit + intent', 'Notify the owner in Slack'] },
          { title: 'Lifecycle follow-up', d: 'A day-0 to day-14 sequence fires the moment a lead qualifies — personalised, logged, and paused the instant they reply.', stat: '3.2×', statLabel: 'more meetings booked', bullets: ['Triggers on qualification', 'Branches on behaviour', 'Human takeover on reply'] },
          { title: 'CRM hygiene agent', d: 'An agent dedupes records, fills missing fields, and flags stale deals nightly — so every report you run is one you can trust.', stat: '0', statLabel: 'fields left blank', bullets: ['Nightly dedupe + enrich', 'Stale-deal flags', 'Audit log on every write'] },
        ],
      },
      {
        tag: 'Funnel leaks', count: '02 / 03',
        title: 'Where your funnel quietly leaks revenue.',
        ctaLine: "Bring us your funnel. We'll show you where the money is leaking — on the first call.",
        slides: [
          { title: 'Leads nobody owns', d: 'Demo requests land in a shared inbox and sit for two days while intent evaporates. Automated routing closes the gap to seconds.', stat: '48h', statLabel: 'average lead sitting time', bullets: ['Auto-assign on arrival', 'Round-robin or rules', 'Escalate if untouched'] },
          { title: 'Follow-up by memory', d: 'When sequences live in reps\u2019 heads, half your pipeline never gets a second touch. Systematise it and nothing slips.', stat: '1 in 2', statLabel: 'leads never followed up', bullets: ['Automated multi-touch', 'Reply-aware pausing', 'Logged to the CRM'] },
          { title: 'A CRM nobody trusts', d: 'Half-filled fields turn every forecast into an argument. Clean data makes the pipeline number the one everyone believes.', stat: '100%', statLabel: 'field completeness', bullets: ['Required-field enforcement', 'Nightly cleanup', 'One source of truth'] },
        ],
      },
      {
        tag: 'Demand & analytics', count: '03 / 03',
        title: 'Turn ad spend into pipeline, not clicks.',
        ctaLine: "Bring us your ad accounts. We'll wire every dirham of spend to revenue.",
        slides: [
          { title: 'Attribution wired to revenue', d: 'Connect every ad platform to closed-won so you finally see which campaigns make money — not just which make noise.', stat: '4.1×', statLabel: 'pipeline-to-spend', bullets: ['Multi-touch attribution', 'Platform → CRM → revenue', 'Weekly source-of-truth report'] },
          { title: 'Scale on pipeline, not clicks', d: 'Budget shifts toward the campaigns generating qualified pipeline, automatically — so spend compounds instead of leaking.', stat: '+38%', statLabel: 'SQLs per quarter', bullets: ['Bid on pipeline signals', 'Pause what doesn\u2019t convert', 'Reallocate weekly'] },
          { title: 'One live dashboard', d: 'Paid, content, and SEO reporting to a single revenue view — the number your whole team opens every Monday.', stat: 'AED 2.4M', statLabel: 'pipeline influenced', bullets: ['Every channel, one view', 'Live, not monthly', 'Board-ready by default'] },
        ],
      },
    ];
    const grounds = ['#fbfbfa', '#f0f0eb', '#fbfbfa'];
    const carousels = raw.map((c, ci) => ({
      ...c,
      bars: mkBars(19 + ci * 6),
      slides: c.slides.map((s, si) => ({ ...s, bg: grounds[si], num: `0${si + 1} / 03` })),
    }));
    return { docFont, carousels: [{ ...carousels[2], count: '' }] };
  }
}
</script>
</body>
</html>
